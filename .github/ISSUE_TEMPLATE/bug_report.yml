name: Bug report
description: Report a reproducible MacFan problem
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please do not attach telemetry databases, screenshots of your desktop, helper logs containing paths, or other personal data.
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.5"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MacFan version or commit
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the selected mode and whether another fan controller was running.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
